<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login - ONG GATITUDE</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Playfair Display", serif;
      }

      body {
        background: #fdf6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .caixa {
        background: white;
        width: 400px;
        padding: 40px;
        border-radius: 20px;
        border: 2px solid #f8bbd0;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 25px;
      }

      .texto input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
      }

      .botao {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #e91e63;
        color: white;
        cursor: pointer;
        margin-top: 10px;
      }

      .botao:hover {
        background: #2e7d32;
      }

      .visitante {
        background: #2e7d32;
      }

      .alerta {
        color: red;
        text-align: center;
        margin: 10px 0;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="caixa">
      <form id="form">
        <h1><i class="fa-solid fa-paw"></i> GATITUDE</h1>

        <div class="texto">
          <input type="text" id="usuario" placeholder="Usuário ADM" />
        </div>

        <div class="texto">
          <input type="password" id="senha" placeholder="Senha ADM" />
        </div>

        <div id="erro" class="alerta">Usuário ou senha incorretos</div>

        <button type="submit" class="botao">Conectar ADM</button>

        <button type="button" id="visitante" class="botao visitante">
          Não sou ADM
        </button>
      </form>
    </div>

    <script>
      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();

        const usuario = document.getElementById("usuario").value;
        const senha = document.getElementById("senha").value;

        if (usuario === "admin" && senha === "1234") {
          localStorage.setItem("modo", "admin");

          window.location.href = "index.html";
        } else {
          document.getElementById("erro").style.display = "block";
        }
      });

      document.getElementById("visitante").addEventListener("click", () => {
        localStorage.setItem("modo", "visitante");

        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
